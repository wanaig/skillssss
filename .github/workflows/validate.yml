name: Validate Prompt Files

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required directories exist
        run: |
          for dir in architecture backend frontend fullstack flutter deploy blockchain; do
            if [ ! -d "$dir" ]; then
              echo "ERROR: Missing directory: $dir"
              exit 1
            fi
          done
          echo "All required directories present"

      - name: Check each agent has YAML frontmatter
        run: |
          errors=0
          for agent in architecture/agents/*.md backend/agents/*.md frontend/agents/*.md fullstack/agents/*.md flutter/agents/*.md deploy/agents/*.md blockchain/agents/*.md; do
            if ! head -1 "$agent" | grep -q '^---$'; then
              echo "ERROR: $agent missing YAML frontmatter"
              errors=$((errors+1))
            fi
          done
          if [ $errors -gt 0 ]; then
            echo "Found $errors agents without YAML frontmatter"
            exit 1
          fi
          echo "All agents have YAML frontmatter"

      - name: Validate agent YAML has required fields
        run: |
          errors=0
          for agent in architecture/agents/*.md backend/agents/*.md frontend/agents/*.md fullstack/agents/*.md flutter/agents/*.md deploy/agents/*.md blockchain/agents/*.md; do
            # Extract YAML frontmatter
            sed -n '/^---$/,/^---$/p' "$agent" | head -n -1 | tail -n +2 > /tmp/frontmatter.yml
            for field in name description tools model; do
              if ! grep -q "^${field}:" /tmp/frontmatter.yml; then
                echo "ERROR: $agent missing required field: $field"
                errors=$((errors+1))
              fi
            done
          done
          if [ $errors -gt 0 ]; then
            echo "Found $errors missing required fields"
            exit 1
          fi
          echo "All agents have required YAML fields"

  naming:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check frontend agent naming consistency
        run: |
          errors=0
          names=$(ls frontend/agents/ | sed 's/\.md$//')
          
          # Dev agent should be dg_frontend_vue_dev
          if ! echo "$names" | grep -q "dg_frontend_vue_dev"; then
            echo "ERROR: Expected frontend dev agent: dg_frontend_vue_dev"
            errors=$((errors+1))
          fi
          
          # Planner should be dg_vue_planner
          if ! echo "$names" | grep -q "dg_vue_planner"; then
            echo "ERROR: Expected frontend planner: dg_vue_planner"
            errors=$((errors+1))
          fi
          
          # Testers should all use dg_vue_tester_* prefix
          for tester in dg_vue_tester_component dg_vue_tester_logic dg_vue_tester_style; do
            if ! echo "$names" | grep -q "$tester"; then
              echo "ERROR: Expected frontend tester: $tester"
              errors=$((errors+1))
            fi
          done
          
          if [ $errors -gt 0 ]; then
            exit 1
          fi
          echo "Frontend naming conventions OK"

      - name: Check backend agent naming consistency
        run: |
          errors=0
          names=$(ls backend/agents/ | sed 's/\.md$//')
          for agent in be_planner be_api_dev be_tester_functional be_tester_performance be_tester_security; do
            if ! echo "$names" | grep -q "$agent"; then
              echo "ERROR: Expected backend agent: $agent"
              errors=$((errors+1))
            fi
          done
          if [ $errors -gt 0 ]; then
            exit 1
          fi
          echo "Backend naming conventions OK"

      - name: Check fullstack agent naming consistency
        run: |
          errors=0
          names=$(ls fullstack/agents/ | sed 's/\.md$//')
          for agent in fs_planner fs_api_dev fs_tester_contract fs_tester_dataflow fs_tester_integration; do
            if ! echo "$names" | grep -q "$agent"; then
              echo "ERROR: Expected fullstack agent: $agent"
              errors=$((errors+1))
            fi
          done
          if [ $errors -gt 0 ]; then
            exit 1
          fi
          echo "Fullstack naming conventions OK"

      - name: Check flutter agent naming consistency
        run: |
          errors=0
          names=$(ls flutter/agents/ | sed 's/\.md$//')
          for agent in dg_flutter_planner dg_flutter_dev dg_flutter_tester_crossplatform dg_flutter_tester_logic dg_flutter_tester_style; do
            if ! echo "$names" | grep -q "$agent"; then
              echo "ERROR: Expected flutter agent: $agent"
              errors=$((errors+1))
            fi
          done
          if [ $errors -gt 0 ]; then
            exit 1
          fi
          echo "Flutter naming conventions OK"

      - name: Check blockchain agent naming consistency
        run: |
          errors=0
          names=$(ls blockchain/agents/ | sed 's/\.md$//')
          for agent in bc_planner bc_solidity_dev bc_tester_functional bc_tester_security bc_tester_gas; do
            if ! echo "$names" | grep -q "$agent"; then
              echo "ERROR: Expected blockchain agent: $agent"
              errors=$((errors+1))
            fi
          done
          if [ $errors -gt 0 ]; then
            exit 1
          fi
          echo "Blockchain naming conventions OK"

  cross-ref:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check subagent_type references in master prompts exist
        run: |
          errors=0
          # Collect all defined agent names from YAML frontmatter
          defined_agents=""
          for agent in architecture/agents/*.md backend/agents/*.md frontend/agents/*.md fullstack/agents/*.md flutter/agents/*.md deploy/agents/*.md blockchain/agents/*.md; do
            name=$(sed -n '/^---$/,/^---$/p' "$agent" | grep '^name:' | sed 's/^name: *//')
            defined_agents="$defined_agents $name"
          done

          # Extract subagent_type references from master prompts and check them
          for master in architecture/main_agent_prompt*.md backend/main_agent_prompt*.md frontend/main_agent_prompt*.md fullstack/main_agent_prompt*.md flutter/main_agent_prompt*.md deploy/main_agent_prompt*.md blockchain/main_agent_prompt*.md; do
            refs=$(grep -oP 'subagent_type:\s*"\K[^"]+' "$master" 2>/dev/null)
            for ref in $refs; do
              if ! echo "$defined_agents" | grep -qw "$ref"; then
                echo "ERROR: $master references undefined agent type: $ref"
                errors=$((errors+1))
              fi
            done
          done

          if [ $errors -gt 0 ]; then
            echo "Found $errors unresolved agent type references"
            exit 1
          fi
          echo "All subagent_type references resolve to defined agents"

  markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Lint changed markdown files (blocking)
        run: |
          npm ci
          DIFF_RANGE=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --prune --depth=1 origin "${{ github.base_ref }}"
            DIFF_RANGE="origin/${{ github.base_ref }}...HEAD"
            CHANGED_MD=$(git diff --name-only "$DIFF_RANGE" -- '*.md')
          else
            if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
              CHANGED_MD=$(git ls-files '*.md')
            else
              DIFF_RANGE="${{ github.event.before }}...${{ github.sha }}"
              CHANGED_MD=$(git diff --name-only "$DIFF_RANGE" -- '*.md')
            fi
          fi

          if [ -z "$CHANGED_MD" ]; then
            echo "No markdown changes detected"
            exit 0
          fi

          echo "Linting changed markdown files:"
          echo "$CHANGED_MD"
          mapfile -t md_files <<< "$CHANGED_MD"
          set +e
          npx markdownlint-cli2 "${md_files[@]}" --config '{
            "default": true,
            "line-length": false,
            "no-inline-html": false,
            "no-duplicate-heading": false,
            "no-trailing-punctuation": false,
            "no-blanks-blockquote": false,
            "single-trailing-newline": false,
            "no-emphasis-as-heading": false,
            "first-line-heading": false,
            "no-alt-text": false
          }' > /tmp/markdownlint.out 2>&1
          lint_exit=$?
          set -e

          if [ $lint_exit -eq 0 ]; then
            echo "Markdown lint passed"
            exit 0
          fi

          cat /tmp/markdownlint.out

          if [ -z "$DIFF_RANGE" ]; then
            echo "Markdown lint failed on initial push (no diff base available)"
            exit 1
          fi

          git diff -U0 "$DIFF_RANGE" -- '*.md' > /tmp/markdown.diff
          awk '
            /^\+\+\+ b\// { file=substr($0, 7); next }
            /^@@/ {
              split($0, parts, " ")
              split(parts[3], span, ",")
              start=span[1]
              sub(/^\+/, "", start)
              count=(span[2] == "" ? 1 : span[2])
              for (i = 0; i < count; i++) {
                if (count > 0) print file ":" (start + i)
              }
            }
          ' /tmp/markdown.diff | sort -u > /tmp/changed_lines.txt

          awk -F: '/^[^:]+:[0-9]+/ {print $1 ":" $2}' /tmp/markdownlint.out | sort -u > /tmp/lint_lines.txt
          comm -12 /tmp/lint_lines.txt /tmp/changed_lines.txt > /tmp/new_lint_lines.txt

          if [ -s /tmp/new_lint_lines.txt ]; then
            echo "Markdown lint errors on changed lines:"
            grep -Ff /tmp/new_lint_lines.txt /tmp/markdownlint.out || true
            exit 1
          fi

          echo "Markdown lint has historical issues outside changed lines; passing incremental gate"

      - name: Check for broken internal links
        run: |
          errors=0
          # Check referenced files exist
          for file in README.md notes_multi_agent_collaboration_design.md; do
            # Extract relative file paths from markdown links
            grep -oP '\[.*?\]\(\./.*?\.md\)' "$file" | grep -oP '(?<=\(\./)[^)]+' | while read path; do
              if [ ! -f "$path" ]; then
                echo "WARNING: Broken link in $file -> $path"
              fi
            done
          done
          echo "Link check completed"
